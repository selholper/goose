version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: restapi_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: restapi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d restapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: restapi_app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: restapi
      DB_SSLMODE: disable
    ports:
      - "8080:8080"

volumes:
  postgres_data:
